<!DOCTYPE html>
<html>
<head>
    <title>Course Registration</title>
</head>
<body>
    <h2>Course Registration Form</h2>
    <form action="register.jsp" method="post">
        Name: <input type="text" name="name" required><br><br>
        Roll No: <input type="text" name="roll" required><br><br>
        Select Courses:<br>
        <input type="checkbox" name="courses" value="Java:2500"> Java (₹2500)<br>
        <input type="checkbox" name="courses" value="DB:2000"> Databases (₹2000)<br>
        <input type="checkbox" name="courses" value="Web:2200"> Web Development (₹2200)<br>
        <input type="checkbox" name="courses" value="AI:3000"> AI Basics (₹3000)<br>
        <br>
        <input type="submit" value="Register">
    </form>
</body>
</html>
