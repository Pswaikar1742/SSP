<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        .box {
            width: 420px;
            border: 1px solid #444;
            padding: 16px;
        }

        h1 {
            font-size: 18px;
            margin: 0 0 12px 0;
        }

        .row {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        .row label {
            width: 140px;
        }

        .row input,
        .row textarea {
            width: 180px;
            padding: 4px;
        }

        textarea {
            height: 50px;
        }

        .btn {
            margin-top: 10px;
            padding: 4px 10px;
        }

        .link {
            margin-top: 8px;
        }

        .success-message {
            color: #060;
            margin-bottom: 8px;
        }

        .error-message {
            color: #c00;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Student Registration Form</h1>

        <div id="successBox" class="success-message" style="display:none;">Registration successful! Please <a href="login.html">login</a> to continue.</div>
        <div id="error1" class="error-message" style="display:none;">Username already exists! Please choose another username.</div>
        <div id="error2" class="error-message" style="display:none;">Passwords do not match!</div>
        <div id="error3" class="error-message" style="display:none;">Please fill all fields!</div>

        <form action="RegisterServlet" method="post">
            <div class="row">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="row">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="row">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            <div class="row">
                <label for="address">Address</label>
                <textarea id="address" name="address" required></textarea>
            </div>
            <button type="submit" class="btn">Register</button>
            <button type="reset" class="btn">Clear</button>
        </form>
        <div class="link">
            <a href="login.html">Login</a>
        </div>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            if (params.get('success') === '1') {
                document.getElementById('successBox').style.display = 'block';
            }
            var err = params.get('error');
            if (err === '1') document.getElementById('error1').style.display = 'block';
            if (err === '2') document.getElementById('error2').style.display = 'block';
            if (err === '3') document.getElementById('error3').style.display = 'block';
        })();
    </script>
</body>
</html>
