<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>
    <h2>Enter Student Details</h2>
    <form action="student_result.jsp" method="post">
        Name: <input type="text" name="name" required><br><br>
        Roll No: <input type="text" name="roll" required><br><br>
        Course: <input type="text" name="course" required><br><br>
        Marks Sub 1: <input type="number" name="m1" required><br><br>
        Marks Sub 2: <input type="number" name="m2" required><br><br>
        Marks Sub 3: <input type="number" name="m3" required><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
