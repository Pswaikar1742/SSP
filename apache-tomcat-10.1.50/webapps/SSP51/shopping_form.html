<!DOCTYPE html>
<html>
<head>
    <title>Online Shopping Cart</title>
</head>
<body>
    <h2>Online Shopping Bill Generator</h2>
    <form action="generate_bill.jsp" method="post">
        Customer Name: <input type="text" name="customerName" required><br><br>
        Product Name: <input type="text" name="product" required><br><br>
        Price per item (₹): <input type="number" name="price" required><br><br>
        Quantity: <input type="number" name="quantity" required><br><br>
        <input type="submit" value="Generate Bill">
    </form>
</body>
</html>
